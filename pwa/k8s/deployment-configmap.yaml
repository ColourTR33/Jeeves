# Alternative deployment using ConfigMap (no Docker build required)
# Create the configmap first:
#   kubectl create configmap jeeves-time-files \
#     --from-file=index.html --from-file=app.js --from-file=style.css \
#     --from-file=manifest.json --from-file=sw.js
#
# To update after changes:
#   kubectl delete configmap jeeves-time-files
#   kubectl create configmap jeeves-time-files --from-file=...
#   kubectl rollout restart deployment jeeves-time

apiVersion: apps/v1
kind: Deployment
metadata:
  name: jeeves-time
  namespace: default
  labels:
    app: jeeves-time
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jeeves-time
  template:
    metadata:
      labels:
        app: jeeves-time
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: pwa-files
              mountPath: /usr/share/nginx/html
              readOnly: true
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "100m"
      volumes:
        - name: pwa-files
          configMap:
            name: jeeves-time-files
---
apiVersion: v1
kind: Service
metadata:
  name: jeeves-time
  namespace: default
spec:
  selector:
    app: jeeves-time
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jeeves-time
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  tls:
    - hosts:
        - jeeves-time.thehartleys.uk
      secretName: jeeves-time-tls
  rules:
    - host: jeeves-time.thehartleys.uk
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jeeves-time
                port:
                  number: 80
