name: Jeeves
options:
  bundleIdPrefix: com.jeeves
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:
  Jeeves:
    type: application
    platform: iOS
    sources:
      - path: Jeeves
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: Jeeves/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.jeeves.app
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
    entitlements:
      path: Jeeves/Jeeves.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.jeeves.app
    capabilities:
      Background Modes:
        modes:
          - audio

  JeevesWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: JeevesWidget
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jeeves.app.widget
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: JeevesWidget/JeevesWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.jeeves.app
    dependencies:
      - target: Jeeves
        embed: false

schemes:
  Jeeves:
    build:
      targets:
        Jeeves: all
        JeevesWidget: all
    run:
      config: Debug
    archive:
      config: Release
